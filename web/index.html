<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f8fc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="BlueSkies" />
  <title>BlueSkies — Skydive Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/png" href="/img/icon-light.png" />
  <link rel="apple-touch-icon" href="/img/icon-light.png" />
  <meta property="og:title" content="BlueSkies — Skydive Tracker" />
  <meta property="og:description" content="Your personal skydive logbook with 3D jump tracks, charts and stats." />
  <meta property="og:image" content="/img/wordmark-light.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header class="topbar">
    <a class="brand" href="#/logbook">
      <img class="brand-img" src="/img/wordmark-light.png" alt="BlueSkies" />
    </a>

    <nav>
      <a href="#/logbook" data-nav="logbook">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20"/></svg>
        <span data-i18n="nav.logbook">Logboek</span>
      </a>
      <a href="#/stats" data-nav="stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M7 21V11"/><path d="M12 21V4"/><path d="M17 21v-7"/></svg>
        <span data-i18n="nav.stats">Statistieken</span>
      </a>
      <a href="#/upload" data-nav="upload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 9l5-5 5 5"/><path d="M12 4v12"/></svg>
        <span data-i18n="nav.upload">Upload</span>
      </a>
    </nav>

    <div class="sync-badge" title="Automatisch verversen — nieuwe sprongen verschijnen vanzelf">
      <span class="sync-dot"></span>
      <span data-i18n="live">Live</span>
    </div>
    <select id="unit-select" class="lang-select" aria-label="Units"></select>
    <select id="lang-select" class="lang-select" aria-label="Language"></select>
  </header>

  <main id="view"></main>

  <footer class="site-footer">
    <span class="foot-brand">BlueSkies</span>
    <span class="dim" data-i18n="footer.tag">Persoonlijke skydive-tracker · vrije-val-waarden zijn schattingen</span>
    <a class="foot-link" href="#/privacy" data-i18n="footer.privacy">Privacy &amp; disclaimer</a>
  </footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
