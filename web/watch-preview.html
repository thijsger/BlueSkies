<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BlueSkies — Watch-animaties</title>
<style>
  :root{--bg:#05070f}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(70% 60% at 50% -10%,#101a33,#05070f 70%);
    color:#eef2fb;font-family:Inter,system-ui,-apple-system,sans-serif;min-height:100vh}
  header{padding:1.8rem 1.4rem .2rem;text-align:center}
  h1{margin:0;font-size:1.6rem;letter-spacing:-.02em;font-weight:800}
  h1 .g{background:linear-gradient(135deg,#5b8cff,#9b6bff);-webkit-background-clip:text;background-clip:text;color:transparent}
  p.sub{color:#8b97b3;margin:.35rem 0 0;font-size:.92rem}
  .grid{display:flex;flex-wrap:wrap;gap:1.4rem;justify-content:center;padding:1.8rem 1.2rem 3rem;max-width:880px;margin:0 auto}
  .cell{text-align:center}
  .dial{border-radius:50%;display:block;box-shadow:0 0 0 8px #0c1322,0 0 0 9px rgba(255,255,255,.05),0 26px 50px -20px #000}
  .name{margin-top:.85rem;font-weight:700;font-size:.95rem;letter-spacing:.02em}
  .hint{color:#5d6a87;text-align:center;font-size:.85rem;padding:0 1rem 3rem}
</style>
</head>
<body>
<header>
  <h1>Blue<span class="g">Skies</span> — fase-animaties</h1>
  <p class="sub">Vloeiende vector-animaties. Exact dezelfde stijl als op het horloge.</p>
</header>
<div class="grid" id="grid"></div>
<p class="hint">Op de watch: idle-scherm → ingedrukt houden = demo speelt alle fases af.</p>

<script>
const SZ = 220, DPR = Math.max(2, window.devicePixelRatio || 1);
const PH = ["KLIM","EXIT","VRIJE VAL","CANOPY","GELAND"];
const PCOL = {KLIM:"#5b9bff",EXIT:"#ffae46",FREEFALL:"#ff5d7a","VRIJE VAL":"#ff5d7a",CANOPY:"#1fe39a",GELAND:"#aeb8cf"};
const INK = "#eef3fb";        // figure stroke (light, on dark dial)
const INK_DIM = "#aebbd4";

const ctxs = [];
for (const p of PH) {
  const cell = document.createElement("div"); cell.className = "cell";
  const c = document.createElement("canvas");
  c.width = SZ*DPR; c.height = SZ*DPR; c.style.width = SZ+"px"; c.style.height = SZ+"px"; c.className = "dial";
  cell.appendChild(c);
  const n = document.createElement("div"); n.className = "name"; n.textContent = p; n.style.color = PCOL[p];
  cell.appendChild(n);
  document.getElementById("grid").appendChild(cell);
  const ctx = c.getContext("2d"); ctx.scale(DPR,DPR);
  ctxs.push([ctx, p]);
}

// ---------- math / drawing helpers ----------
const TAU = Math.PI*2;
const ease = (t)=> 0.5 - 0.5*Math.cos(t*Math.PI); // 0..1..0 smoothstep-ish via cos input
function R(ox,oy,lx,ly,ca,sa){return [ox+lx*ca-ly*sa, oy+lx*sa+ly*ca];}
function lerp(a,b,t){return a+(b-a)*t;}

function limb(ctx,p1,p2,w,col){
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap="round"; ctx.lineJoin="round";
  ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
}
function limb3(ctx,p1,p2,p3,w,col){
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap="round"; ctx.lineJoin="round";
  ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.lineTo(p3[0],p3[1]); ctx.stroke();
}
function curve(ctx,p1,cp,p2,w,col){
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.quadraticCurveTo(cp[0],cp[1],p2[0],p2[1]); ctx.stroke();
}
function dot(ctx,x,y,r,col){ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();}
// head with helmet + colored visor, facing direction ang (radians, screen)
function head(ctx,x,y,r,ang,visor){
  dot(ctx,x,y,r,INK);
  // visor: bright arc on the facing side
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r*0.96,ang-0.9,ang+0.9); ctx.arc(x,y,r*0.34,ang+0.9,ang-0.9,true); ctx.closePath();
  ctx.fillStyle=visor; ctx.shadowColor=visor; ctx.shadowBlur=8; ctx.fill();
  ctx.restore();
}
// soft ground shadow ellipse
function shadow(ctx,x,y,rx,ry){
  const g=ctx.createRadialGradient(x,y,0,x,y,rx);
  g.addColorStop(0,"rgba(0,0,0,0.35)"); g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.save(); ctx.translate(x,y); ctx.scale(1,ry/rx);
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,rx,0,TAU); ctx.fill(); ctx.restore();
}

function dialBg(ctx,ph){
  const g=ctx.createRadialGradient(SZ*0.5,SZ*0.32,SZ*0.1,SZ*0.5,SZ*0.5,SZ*0.62);
  if(ph=="GELAND"){g.addColorStop(0,"#15233c");g.addColorStop(1,"#0a1322");}
  else{g.addColorStop(0,"#13203b");g.addColorStop(1,"#070d1a");}
  ctx.fillStyle=g; ctx.fillRect(0,0,SZ,SZ);
}

// ---------- scenes ----------
function draw(ctx, ph, f){
  ctx.clearRect(0,0,SZ,SZ);
  dialBg(ctx,ph);
  ctx.lineCap="round"; ctx.lineJoin="round"; ctx.textAlign="center";
  ctx.fillStyle=PCOL[ph]; ctx.font="700 13px Inter,sans-serif";
  ctx.shadowColor=PCOL[ph]; ctx.shadowBlur=10;
  ctx.fillText(ph, SZ/2, SZ*0.135);
  ctx.shadowBlur=0;

  const t=f/1000; // seconds-ish
  if(ph=="KLIM") climb(ctx,t);
  else if(ph=="EXIT") exit(ctx,t);
  else if(ph=="VRIJE VAL") freefall(ctx,t);
  else if(ph=="CANOPY") canopy(ctx,t);
  else landed(ctx,t);

  // subtle stat line
  ctx.shadowBlur=0; ctx.fillStyle="#aebbd4"; ctx.font="600 10px Inter,sans-serif";
  const alt={KLIM:"3 500 m",EXIT:"4 000 m","VRIJE VAL":"2 200 m",CANOPY:"700 m",GELAND:"0 m"}[ph];
  ctx.fillText(alt, SZ*0.5, SZ*0.88);
}

// ---- plane (clean line-art jump plane), centre px,py, tilt a, scale s ----
function plane(ctx,px,py,a,s,f){
  const ca=Math.cos(a), sa=Math.sin(a), U=10*s;
  const P=(x,y)=>R(px,py,x*U,y*U,ca,sa);
  ctx.lineJoin="round"; ctx.lineCap="round";
  // prop blur disc
  const hub=P(3.2,-0.05);
  ctx.save(); ctx.translate(hub[0],hub[1]); ctx.rotate(a);
  const pg=ctx.createRadialGradient(0,0,0,0,0,U*1.25);
  pg.addColorStop(0,"rgba(220,232,250,0.30)"); pg.addColorStop(1,"rgba(220,232,250,0)");
  ctx.fillStyle=pg; ctx.beginPath(); ctx.ellipse(0,0,U*0.4,U*1.25,0,0,TAU); ctx.fill(); ctx.restore();
  // fuselage
  ctx.fillStyle="#dbe3f0";
  poly(ctx,[P(-3.1,0.25),P(-2.7,-0.48),P(2.2,-0.62),P(3.05,-0.3),P(3.22,0.0),P(3.0,0.24),P(2.35,0.62),P(-2.7,0.6)]);
  // window strip
  ctx.fillStyle="#0e1b30";
  poly(ctx,[P(-1.9,-0.34),P(2.0,-0.46),P(2.45,-0.14),P(-1.9,-0.04)]);
  // brand stripe
  ctx.strokeStyle="#5b9bff"; ctx.lineWidth=U*0.16; limb(ctx,P(-2.4,0.22),P(2.5,0.06),U*0.16,"#5b9bff");
  // tail fin
  ctx.fillStyle="#dbe3f0"; poly(ctx,[P(-3.05,-0.4),P(-2.55,-1.7),P(-2.1,-1.7),P(-2.25,-0.45)]);
  // high wing
  poly(ctx,[P(-0.9,-0.62),P(2.25,-0.8),P(2.4,-0.55),P(-0.8,-0.4)]);
  // strut + gear
  ctx.strokeStyle="#aab6c9"; ctx.lineWidth=Math.max(1.4,U*0.07);
  let a1=P(-0.1,-0.45),a2=P(0.5,0.22); limb(ctx,a1,a2,U*0.07,"#aab6c9");
  limb(ctx,P(0.4,0.6),P(0.4,1.18),U*0.09,"#8e9bb2");
  limb(ctx,P(-0.6,0.6),P(-0.6,1.18),U*0.09,"#8e9bb2");
  dot(ctx,...P(0.4,1.26),U*0.18,"#11192b"); dot(ctx,...P(-0.6,1.26),U*0.18,"#11192b");
  // prop blades
  ctx.strokeStyle="#eef3fb"; ctx.lineWidth=Math.max(1.4,U*0.09);
  for(let b=0;b<3;b++){const ang=f*7+b*TAU/3;
    limb(ctx,hub,[hub[0]+Math.cos(ang)*U*1.2,hub[1]+Math.sin(ang)*U*1.2],U*0.09,"rgba(238,243,251,0.85)");}
  dot(ctx,hub[0],hub[1],U*0.13,"#eef3fb");
}
function poly(ctx,pts){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fill();}
function softCloud(ctx,x,y,r){ctx.fillStyle="rgba(140,165,210,0.12)";
  for(const[dx,dy,rr]of[[0,0,1],[1,0.15,0.75],[-0.9,0.2,0.62],[0.25,-0.4,0.6]])dot(ctx,x+dx*r,y+dy*r,rr*r,"rgba(140,165,210,0.12)");}

function climb(ctx,t){
  const cx=SZ/2, cy=SZ*0.46, U=SZ/22;
  const span=SZ+U*4;
  softCloud(ctx,((t*22)%span)-U*2, cy+U*2.2, U*1.1);
  softCloud(ctx,((t*13+span*0.5)%span)-U*2, cy+U*3.3, U*0.85);
  const bob=Math.sin(t*2.0)*U*0.22;
  plane(ctx,cx+Math.sin(t*0.8)*U*0.5, cy+bob, -0.26, 1.05, t);
}

function exit(ctx,t){
  const cx=SZ/2, cy=SZ*0.45, U=SZ/22;
  const loop=(t*0.5)%1;            // 0..1 progress of the dive-away
  const e=ease(loop);
  // plane recedes up-left as the loop progresses
  const pscale=lerp(0.56,0.46,loop);
  plane(ctx, cx-3.0*U - loop*1.6*U, cy-3.0*U - loop*0.5*U, -0.16, pscale, t);
  // jumper travels along an arc from below the door to lower-centre, into arch
  const jx=lerp(cx-1.4*U, cx+0.8*U, e);
  const jy=lerp(cy-1.1*U, cy+1.2*U, e);
  const rot=lerp(-1.5, 0.0, e);     // upright(ish) -> belly-to-earth
  shadow(ctx, jx, jy+1.7*U, 1.6*U, 0.5*U);
  stickFly(ctx, jx, jy, U*0.95, rot, t, PCOL.EXIT, 0.0);
  // faint motion trail
  ctx.strokeStyle="rgba(255,174,70,0.35)"; ctx.lineWidth=2; ctx.setLineDash([3,5]);
  ctx.beginPath(); ctx.moveTo(cx-1.4*U,cy-1.1*U);
  ctx.quadraticCurveTo(cx-1.3*U,cy+0.3*U,jx,jy); ctx.stroke(); ctx.setLineDash([]);
}

function freefall(ctx,t){
  const cx=SZ/2, cy=SZ*0.46, U=SZ/22;
  // wind streaks rushing up
  const span=SZ*0.62;
  for(let i=0;i<11;i++){
    const sx=cx+((i-5)*0.88)*U;
    const off=((t*150+i*47)%span);
    const sy=cy+2.6*U-off;
    const fade=0.10+0.30*(1-off/span);
    ctx.strokeStyle="rgba(150,180,230,"+fade.toFixed(2)+")"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx,sy-U*1.1); ctx.stroke();
  }
  const bob=Math.sin(t*1.6)*U*0.12;
  shadow(ctx,cx,cy+2.7*U,2.0*U,0.45*U);
  stickFly(ctx,cx,cy+bob,U*1.12,Math.sin(t*0.9)*0.06,t,PCOL.FREEFALL,1.0);
}

// belly-to-earth stick figure (arched box). flutter 0..1 scales limb wobble.
function stickFly(ctx,fx,fy,U,rot,t,visor,flutterAmt){
  const ca=Math.cos(rot),sa=Math.sin(rot);
  const J=(x,y)=>R(fx,fy,x*U,y*U,ca,sa);
  const fl=Math.sin(t*5)*0.13*flutterAmt;
  const w=Math.max(3,U*0.5), w2=Math.max(2.4,U*0.4);
  // torso (slight arch via curve)
  curve(ctx, J(0,-0.85), J(-0.25,-0.1), J(0.05,0.7), w, INK);
  // arms: shoulder -> elbow -> hand (bent up-out)
  limb3(ctx, J(0,-0.7), J(-1.05,-0.95-fl), J(-1.55,-1.75-fl), w2, INK);
  limb3(ctx, J(0,-0.7), J(1.05,-0.95+fl), J(1.55,-1.75+fl), w2, INK);
  dot(ctx,...J(-1.55,-1.75-fl),w2*0.55,INK); dot(ctx,...J(1.55,-1.75+fl),w2*0.55,INK);
  // legs: hip -> knee -> foot (bent down-out)
  limb3(ctx, J(0.05,0.65), J(-0.95,1.5+fl), J(-0.6,2.4+fl), w2, INK);
  limb3(ctx, J(0.05,0.65), J(0.95,1.5-fl), J(0.6,2.4-fl), w2, INK);
  dot(ctx,...J(-0.6,2.4+fl),w2*0.6,INK); dot(ctx,...J(0.6,2.4-fl),w2*0.6,INK);
  // head + visor (facing down-screen = relative wind)
  const hd=J(0,-1.4); head(ctx,hd[0],hd[1],U*0.5, Math.PI/2 + rot, visor);
}

function canopy(ctx,t){
  const cx=SZ/2, cy=SZ*0.5, U=SZ/22;
  const sway=Math.sin(t*1.1)*0.16;          // pendulum
  const ca=Math.cos(sway),sa=Math.sin(sway);
  const ax=cx, ay=cy+1.1*U;
  const W=(x,y)=>R(ax,ay,x*U,y*U,ca,sa);
  // ---- ram-air wing (smooth, arced, cells) ----
  const halfW=2.9, depth=0.62, arc=0.95, wy=-3.5, N=9;
  const top=[],bot=[];
  for(let i=0;i<=N;i++){const u=(i/N)*2-1; const x=u*halfW; const sag=arc*(1-u*u);
    top.push(W(x,wy-sag-depth)); bot.push(W(x,wy-sag));}
  // fill with vertical gradient green
  ctx.save();
  ctx.beginPath(); ctx.moveTo(top[0][0],top[0][1]);
  for(let i=1;i<=N;i++)ctx.lineTo(top[i][0],top[i][1]);
  for(let i=N;i>=0;i--)ctx.lineTo(bot[i][0],bot[i][1]); ctx.closePath();
  const gg=ctx.createLinearGradient(0,top[0][1],0,bot[0][1]);
  gg.addColorStop(0,"#27f0a8"); gg.addColorStop(1,"#0db97c");
  ctx.fillStyle=gg; ctx.shadowColor="rgba(31,227,154,0.5)"; ctx.shadowBlur=12; ctx.fill();
  ctx.restore();
  // cell ribs
  ctx.strokeStyle="rgba(4,40,28,0.45)"; ctx.lineWidth=1.4;
  for(let i=0;i<=N;i++){ctx.beginPath();ctx.moveTo(top[i][0],top[i][1]);ctx.lineTo(bot[i][0],bot[i][1]);ctx.stroke();}
  // nose openings
  ctx.fillStyle="#04281b";
  for(let i=0;i<N;i++){const mx=(bot[i][0]+bot[i+1][0])/2,my=(bot[i][1]+bot[i+1][1])/2;
    ctx.beginPath();ctx.ellipse(mx,my+U*0.12,U*0.1,U*0.16,sa,0,TAU);ctx.fill();}
  // ---- suspension lines cascade + slider ----
  const riserL=W(-0.42,-0.1), riserR=W(0.42,-0.1);
  ctx.strokeStyle="rgba(220,230,245,0.55)"; ctx.lineWidth=1;
  for(let i=0;i<=N;i++){const tgt=i<=N/2?riserL:riserR;
    ctx.beginPath();ctx.moveTo(bot[i][0],bot[i][1]);ctx.lineTo(tgt[0],tgt[1]);ctx.stroke();}
  const sl=W(0,-1.5); ctx.save();ctx.translate(sl[0],sl[1]);ctx.rotate(sa);
  ctx.fillStyle="rgba(40,48,64,0.9)"; ctx.fillRect(-U*1.2,-U*0.1,U*2.4,U*0.2); ctx.restore();
  // ---- jumper in harness ----
  const w=Math.max(3,U*0.5), w2=Math.max(2.4,U*0.4);
  shadow(ctx, W(0,3.3)[0], W(0,3.3)[1], 1.4*U, 0.4*U);
  curve(ctx, W(0,0.55), W(0.05,1.2), W(0,1.8), w, INK);      // torso
  limb(ctx, W(0,0.75), riserL, w2, INK); limb(ctx, W(0,0.75), riserR, w2, INK); // arms up to toggles
  limb3(ctx, W(0,1.78), W(-0.3,2.6), W(-0.25,3.2), w2, INK);
  limb3(ctx, W(0,1.78), W(0.3,2.6), W(0.32,3.2), w2, INK);
  dot(ctx,...W(-0.25,3.2),w2*0.6,INK); dot(ctx,...W(0.32,3.2),w2*0.6,INK);
  const hd=W(0,0.25); head(ctx,hd[0],hd[1],U*0.42, -Math.PI/2+sway, PCOL.CANOPY);
}

function landed(ctx,t){
  const cx=SZ/2, cy=SZ*0.5, U=SZ/22, gy=cy+2.3*U;
  // ground
  const gg=ctx.createLinearGradient(0,gy,0,SZ); gg.addColorStop(0,"#22351d");gg.addColorStop(1,"#16240f");
  ctx.fillStyle=gg; ctx.fillRect(0,gy,SZ,SZ-gy);
  ctx.strokeStyle="#3f5a30"; ctx.lineWidth=2; ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(SZ,gy);ctx.stroke();
  ctx.strokeStyle="#33502a"; ctx.lineWidth=1.6;
  for(let i=-3;i<=3;i++){const gx=cx+i*U; limb(ctx,[gx,gy],[gx-U*0.12,gy-U*0.4],1.6,"#33502a"); limb(ctx,[gx,gy],[gx+U*0.12,gy-U*0.4],1.6,"#33502a");}
  // collapsed ram-air canopy behind (right), soft folds
  ctx.fillStyle="#0db97c";
  poly(ctx,[[cx+0.6*U,gy],[cx+1.2*U,gy-0.6*U],[cx+1.8*U,gy-0.22*U],[cx+2.4*U,gy-0.62*U],[cx+3.0*U,gy-0.18*U],[cx+3.4*U,gy]]);
  ctx.strokeStyle="rgba(4,40,28,0.4)"; ctx.lineWidth=1.2;
  for(let i=1;i<=4;i++){const x=cx+(0.6+i*0.55)*U; limb(ctx,[x,gy],[x,gy-0.35*U],1.2,"rgba(4,40,28,0.4)");}
  ctx.strokeStyle="rgba(220,230,245,0.45)"; ctx.lineWidth=1;
  limb(ctx,[cx+1.2*U,gy-0.45*U],[cx-0.6*U,gy-1.1*U],1,"rgba(220,230,245,0.45)");
  limb(ctx,[cx+2.0*U,gy-0.4*U],[cx-0.45*U,gy-1.1*U],1,"rgba(220,230,245,0.45)");
  // standing stickman (left), gentle idle sway
  const s=Math.sin(t*1.0)*0.04;
  const fx=cx-1.5*U;
  const w=Math.max(3,U*0.5), w2=Math.max(2.4,U*0.4);
  shadow(ctx,fx,gy+1,1.0*U,0.22*U);
  // legs
  limb3(ctx,[fx-0.05*U,gy-1.45*U],[fx-0.28*U,gy-0.72*U],[fx-0.3*U,gy],w2,INK);
  limb3(ctx,[fx+0.05*U,gy-1.45*U],[fx+0.28*U,gy-0.72*U],[fx+0.3*U,gy],w2,INK);
  dot(ctx,fx-0.3*U,gy,w2*0.55,INK); dot(ctx,fx+0.3*U,gy,w2*0.55,INK);
  // torso (slight sway)
  const top=[fx+s*U,gy-2.3*U];
  limb(ctx,top,[fx,gy-1.4*U],w,INK);
  // arms relaxed
  limb3(ctx,[fx+s*0.6*U,gy-2.1*U],[fx-0.5*U,gy-1.7*U],[fx-0.6*U,gy-1.1*U],w2,INK);
  limb3(ctx,[fx+s*0.6*U,gy-2.1*U],[fx+0.5*U,gy-1.7*U],[fx+0.6*U,gy-1.1*U],w2,INK);
  // head + visor
  head(ctx,top[0],gy-2.7*U,U*0.42,-Math.PI/2,PCOL.GELAND);
}

let f=0;
function loop(){ f+=1; for(const[ctx,p]of ctxs) draw(ctx,p,f); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
